<div
    class="flex items-center justify-between p-6 bg-white rounded-xl shadow-sm border border-gray-100 transition-all hover:shadow-md">
    <div class="space-y-1">
        <p class="text-sm font-medium text-slate-500 uppercase tracking-wider">{{ label }}</p>
        <h3 class="text-3xl font-bold text-slate-900">{{ value | number }}</h3>
    </div>

    <div [style.backgroundColor]="bgColor" class="h-12 w-12 rounded-xl flex items-center justify-center">
        <i [class]="iconClass" [style.color]="iconColor" class="text-xl"></i>
    </div>
</div>
