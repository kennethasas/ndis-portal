<div
    class="group flex w-full max-w-[320px] flex-col rounded-[24px] border border-[#e9e2e2] bg-white p-6 shadow-sm transition-all hover:shadow-md">

    <div class="mb-5 flex h-10 w-10 items-center justify-center rounded-full bg-[#f3f0f5]">
        <ng-content select="[icon]">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#5D3A89" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 1.85 8.2a7 7 0 0 1-9.85 9.8z"></path>
                <path d="M11 20l3-3"></path>
            </svg>
        </ng-content>
    </div>

    <div class="flex-1">
        <h2 class="mb-3 text-[20px] font-semibold leading-tight text-[#001a33]">
            {{ title }}
        </h2>
        <p class="min-h-[60px] text-sm leading-relaxed text-[#7b8da0]">
            {{ description }}
        </p>
    </div>

    <div class="mt-6 flex items-center justify-between border-t border-[#f0f4f8] pt-4">
        <span *ngIf="tag"
            class="rounded-lg border border-[#e9e2e2] px-3 py-1.5 text-[10px] font-bold uppercase tracking-wider text-[#7b8da0]">
            {{ tag }}
        </span>

        <button *ngIf="showArrow"
            class="flex h-9 w-9 items-center justify-center rounded-full bg-[#f8fafc] transition-colors group-hover:bg-[#5D3A89]/10"
            aria-label="Next">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7B8DA0" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" class="transition-transform group-hover:translate-x-1">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
            </svg>
        </button>
    </div>
</div>
