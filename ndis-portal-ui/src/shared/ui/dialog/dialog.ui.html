<div *ngIf="isOpen" class="fixed inset-0 z-[1000] flex items-center justify-center p-3 sm:p-4 md:p-6 2xl:p-10">
  <div (click)="close.emit()" class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm animate-in fade-in duration-200">
  </div>

  <div
    class="relative w-full bg-white rounded-md overflow-hidden sm:max-w-lg 2xl:max-w-2xl 4xl:max-w-4xl animate-in slide-in-from-bottom sm:zoom-in-95 duration-300">

    <div class="flex items-center justify-between 
                px-4 py-3 
                sm:px-5 sm:py-4 
                md:px-6 md:py-5 
                2xl:px-10 2xl:py-8 
                border-b border-slate-100">
      <h3 class="text-[13px] sm:text-sm md:text-base 2xl:text-2xl 4xl:text-4xl font-bold text-slate-900">
        {{ label }}
      </h3>
      <button (click)="close.emit()" class="p-1 text-slate-400 hover:text-slate-600 2xl:scale-150">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div
      class="px-5 py-6 2xl:px-10 2xl:py-12 text-[11px] sm:text-xs md:text-sm 2xl:text-xl 4xl:text-3xl text-slate-600">
      <ng-content select="[body]"></ng-content>
    </div>

    <div class="px-5 py-4 bg-slate-50/50 flex flex-col sm:flex-row justify-end gap-2 2xl:px-10 2xl:py-8">
      <ng-content select="[actions]"></ng-content>
    </div>
  </div>
</div>
