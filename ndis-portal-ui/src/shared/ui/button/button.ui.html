<button [type]="type" (click)="onClick.emit($event)"
  [ngClass]="[variantClasses[variant], fullWidth ? 'w-full' : 'w-auto']"
  class="inline-flex items-center justify-center gap-2 font-semibold">
  <ng-content select="[left-icon]"></ng-content>
  <span>{{ label }}</span>
  <ng-content select="[right-icon]"></ng-content>
</button>
