<nav class="flex h-16 w-full items-center justify-between border-b border-slate-200 bg-white px-4 md:px-8">

  <div class="flex h-full items-center gap-2 text-sm text-slate-500">
    <div (click)="toggleSidebar()"
      class="cursor-pointer p-2 rounded-lg hover:bg-slate-50 transition-colors text-slate-500 hover:text-slate-900">
      <app-icon-sidebar></app-icon-sidebar>
    </div>
    <div class="flex items-center">
      <app-icon-home [size]="16" class="mr-1.5 flex items-center text-slate-400"></app-icon-home>
      <a>Home</a>
    </div>

    <ng-container *ngFor="let bc of breadcrumbs; let last = last">
      <span class="select-none text-slate-300">›</span>
      <div class="flex items-center">
        <a *ngIf="!last" [routerLink]="bc.url"
          class="max-w-[100px] truncate transition-colors hover:text-slate-900 md:max-w-none">
          {{ bc.label }}
        </a>
        <span *ngIf="last" class="max-w-[100px] truncate font-medium text-slate-900 md:max-w-none">
          {{ bc.label }}
        </span>
      </div>
    </ng-container>
  </div>

 
</nav>
