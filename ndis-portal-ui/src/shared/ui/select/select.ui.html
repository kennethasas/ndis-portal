<div class="flex flex-col gap-2 w-full">
  <label class="text-sm font-bold text-slate-700 flex items-center gap-1">
    <ng-content select="[label-content]"></ng-content>
    <span *ngIf="isRequired" class="text-rose-500 font-black">*</span>
  </label>

  <div class="relative w-full">
    <ng-content select="select"></ng-content>

    <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
      <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6"></path>
      </svg>
    </div>
  </div>
</div>
