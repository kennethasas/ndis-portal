<div class="relative block w-full sm:inline-block sm:w-auto font-sans">
  <button
    type="button"
    (click)="toggle()"
    [ngClass]="{
      'border-violet-600 ring-2 ring-violet-600/10': isOpen,
      'border-slate-200': !isOpen
    }"
    class="flex h-9 w-full cursor-pointer items-center justify-between gap-2 rounded-lg border bg-white px-3 transition-all duration-200 hover:bg-slate-50 hover:border-slate-300 focus:outline-none sm:w-auto sm:justify-center 2xl:h-12 2xl:px-5"
  >
    <span class="flex min-w-0 items-center gap-1.5">
      <span *ngIf="showIcon" class="inline-flex items-center justify-center text-slate-500">
        <div class="scale-90 sm:scale-100 2xl:scale-125">
          <ng-content select="[icon]"></ng-content>
        </div>
      </span>

      <span class="block truncate text-xs font-medium capitalize text-slate-900 md:text-sm 2xl:text-lg">
        {{ label }}
      </span>
    </span>

    <span
      class="flex items-center text-slate-400 transition-transform duration-200"
      [class.rotate-180]="isOpen"
    >
      <svg width="8" height="5" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M1 1L5 5L9 1" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </span>
  </button>

  <div
    *ngIf="isOpen"
    class="absolute left-0 right-0 top-[calc(100%+4px)] z-[100] max-h-[60vh] w-full max-w-[calc(100vw-1.5rem)] overflow-y-auto rounded-lg border border-slate-200 bg-white p-1 shadow-lg animate-in fade-in zoom-in duration-150 sm:left-auto sm:right-0 sm:w-max sm:min-w-[160px] 2xl:min-w-[220px]"
  >
    <ng-container *ngFor="let option of options">
      <div *ngIf="option.isDivider" class="h-px my-1 bg-slate-100"></div>

      <button
        *ngIf="!option.isDivider"
        type="button"
        (click)="selectOption(option)"
        [ngClass]="option.value === selectedValue
          ? 'bg-violet-50 text-violet-700 font-semibold'
          : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'"
        class="flex w-full items-center justify-between gap-3 rounded px-3 py-2 text-left text-xs transition-colors sm:text-xs md:rounded-md 2xl:text-base 2xl:py-3"
      >
        <span class="block min-w-0 whitespace-normal break-words pr-2">
          {{ option.label }}
        </span>

        <svg
          *ngIf="option.value === selectedValue"
          class="h-3 w-3 flex-shrink-0 text-violet-600 2xl:h-5 2xl:w-5"
          fill="currentColor"
          viewBox="0 0 20 20"
        >
          <path
            fill-rule="evenodd"
            d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
            clip-rule="evenodd"
          />
        </svg>
      </button>
    </ng-container>
  </div>
</div>
