<div class="relative inline-block font-sans">
  <!-- Trigger Button -->
  <button type="button" (click)="toggle()" [ngClass]="isOpen ? getVariantClasses().buttonActive : 'border-slate-200'"
    class="flex items-center justify-between min-w-[140px] h-9 px-3 gap-3 bg-white border rounded-lg cursor-pointer transition-all duration-200 hover:bg-slate-50 hover:border-slate-300 focus:outline-none 2xl:h-12">

    <span class="flex items-center gap-2">
      <span *ngIf="showIcon" class="inline-flex items-center justify-center text-slate-500">
        <ng-content select="[icon]"></ng-content>
      </span>
      <span class="text-sm font-medium text-slate-900 capitalize 2xl:text-lg">
        {{ label }}
      </span>
    </span>

    <!-- Arrow Icon -->
    <span class="flex items-center text-slate-400 transition-transform duration-200" [class.rotate-180]="isOpen">
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M1 1L5 5L9 1" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </span>
  </button>

  <!-- Dropdown Menu -->
  <div *ngIf="isOpen"
    class="absolute top-[calc(100%+6px)] right-0 min-w-[180px] p-1.5 bg-white border border-slate-200 rounded-xl shadow-xl z-[100] animate-in fade-in zoom-in duration-150">

    <ng-container *ngFor="let option of options">
      <div *ngIf="option.isDivider" class="h-px my-1 bg-slate-100"></div>

      <button *ngIf="!option.isDivider" type="button" (click)="selectOption(option)"
        [ngClass]="option.value === selectedValue ? getVariantClasses().itemActive : getVariantClasses().itemHover"
        class="flex items-center justify-between w-full px-3 py-2 text-sm rounded-lg transition-colors">

        <span class="block whitespace-nowrap pr-4">{{ option.label }}</span>

        <!-- Checkmark Icon -->
        <svg *ngIf="option.value === selectedValue" [ngClass]="getVariantClasses().checkIcon" class="w-4 h-4"
          fill="currentColor" viewBox="0 0 20 20">
          <path fill-rule="evenodd"
            d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z"
            clip-rule="evenodd" />
        </svg>
      </button>
    </ng-container>
  </div>
</div>
