<div [@chatAnimation]="state" class="
  fixed bottom-0 right-0

  /* 📱 MOBILE = FULL SCREEN */
  w-full h-full

  /* 🖥️ DESKTOP */
  sm:bottom-6 sm:right-6
  sm:w-[380px]
  sm:h-[520px]

  md:h-[70vh]

  bg-white
  rounded-lg
  border
  flex flex-col
  overflow-hidden
  z-50
  ">

    <!-- HEADER -->
    <div class="
    flex items-center justify-between
    px-4 py-3
    border-b
    bg-white
    ">

        <div class="flex items-center gap-2">

            <!-- Bot Avatar -->
            <div class="
                w-8 h-8
                rounded-full
                bg-[#6B3293]
                flex items-center justify-center
                font-bold
        ">
                🤖
            </div>

            <span class="font-semibold text-slate=700 ">

                Assistant

            </span>

        </div>

        <!-- Close -->
        <button (click)="close.emit()" class="text-slate=700 text-lg">
            ✕
        </button>

    </div>


    <!-- MESSAGES AREA -->
    <div class="
    flex-1
    overflow-hidden
    ">

        <app-chat-messages class="block h-full">
        </app-chat-messages>

    </div>


    <!-- BOOK SERVICE BUTTON - shows when service detected -->
    <button *ngIf="detectedService" (click)="onBookService()" class="
        mx-4 mt-3 mb-1
        bg-[#6B3293] text-white
        px-4 py-2
        rounded-md
        text-sm font-medium
        hover:bg-[#5a2a7d]
        transition-all duration-200
        shadow-lg
        hover:shadow-xl
        transform hover:-translate-y-0.5
        animate-fade-in
    ">
        Book {{ detectedService.name }}
    </button>

    <!-- INPUT -->
    <div class="
    border-t
    ">

        <app-chat-input>
        </app-chat-input>

    </div>

</div>
