<div class="flex w-full items-end gap-2" [ngClass]="{
    'justify-start': isBot(),
    'justify-end': !isBot()
  }">

  <ng-container *ngIf="isBot()">
    <div class="
      w-9 h-9
      rounded-full
      bg-[#6B3293]
      text-white
      flex items-center
      justify-center
      flex-shrink-0
      shadow
      ">
      <app-icon-chat [size]="22"></app-icon-chat>
    </div>
  </ng-container>

  <div class="
    max-w-[85%]
    px-4 py-3
    rounded-2xl
    text-sm
    break-words
    shadow-sm
    leading-relaxed
    " [ngClass]="{
      'bg-gray-100 text-gray-800 rounded-bl-none': isBot(),
      'bg-[#6B3293] text-white rounded-br-none': !isBot()
    }">
    <!-- Regular message content -->
    <div [innerHTML]="formatMessage(message.content)"></div>
    
    <!-- Service Recommendations as Cards with Book Button Inside -->
    <div *ngIf="message.recommendations && message.recommendations.length > 0" class="mt-4 space-y-4">
      <!-- Brief explanation at the top -->
      <p *ngIf="message.recommendations[0]?.reason" class="text-sm text-[#4a5568] leading-relaxed mb-3">
        {{ message.recommendations[0].reason }}
      </p>
      <div *ngFor="let rec of message.recommendations" 
           class="group flex flex-col rounded-[24px] border border-[#e9e2e2] bg-white p-5 shadow-sm transition-all hover:shadow-md"
           style="max-width: 260px;">
        
        <!-- Icon -->
        <div class="mb-4 flex h-9 w-9 items-center justify-center rounded-full text-[#6b21a8] bg-[#f3f0f5]">
          <app-dynamic-icon [name]="getIconForCategory(rec.categoryName)"></app-dynamic-icon>
        </div>

        <!-- Content -->
        <div class="flex flex-1 flex-col">
          <h4 class="mb-2 text-[16px] font-semibold leading-tight text-[#001a33]">
            {{ rec.serviceName }}
          </h4>
          <p class="mt-1 flex-grow text-sm leading-relaxed text-[#7b8da0] line-clamp-2">
            {{ rec.description }}
          </p>
        </div>

        <!-- Footer with Book Button replacing the tag -->
        <div class="mt-4 pt-3 border-t border-[#f0f4f8]">
          <button (click)="bookService(rec.serviceId)"
                  class="text-xs font-medium text-white bg-[#6F2C91] hover:bg-[#5a189a] transition-colors px-4 py-2 rounded-full w-full">
            Book this service
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
