<div class="flex w-full items-end gap-2" [ngClass]="{
    'justify-start': isBot(),
    'justify-end': !isBot()
  }">

  <ng-container *ngIf="isBot()">
    <div class="
      w-9 h-9
      rounded-full
      bg-[#6B3293]
      text-white
      flex items-center
      justify-center
      flex-shrink-0
      shadow
      ">
      <app-icon-chat [size]="22"></app-icon-chat>
    </div>
  </ng-container>

  <div class="
    max-w-[85%]
    px-4 py-3
    rounded-2xl
    text-sm
    break-words
    shadow-sm
    leading-relaxed
    " [ngClass]="{
      'bg-gray-100 text-gray-800 rounded-bl-none': isBot(),
      'bg-[#6B3293] text-white rounded-br-none': !isBot()
    }">
    <!-- Regular message content -->
    <div [innerHTML]="formatMessage(message.content)"></div>
    
    <!-- Service Recommendations as Cards -->
    <div *ngIf="message.recommendations && message.recommendations.length > 0" class="mt-4 space-y-3">
      <div *ngFor="let rec of message.recommendations" 
           class="group bg-white rounded-xl border border-gray-200 p-3 shadow-sm hover:shadow-md transition-all hover:border-[#6F2C91]"
           style="max-width: 280px;">
        
        <!-- Compact Service Card -->
        <div class="flex items-start gap-3">
          <!-- Icon -->
          <div class="flex-shrink-0 w-8 h-8 rounded-full bg-[#f3f0f5] flex items-center justify-center">
            <svg class="w-4 h-4 text-[#6F2C91]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
          </div>
          
          <!-- Content -->
          <div class="flex-1 min-w-0">
            <h4 class="font-semibold text-gray-900 text-sm truncate">{{ rec.serviceName }}</h4>
            <p class="text-xs text-[#6F2C91] font-medium mt-0.5">{{ rec.categoryName }}</p>
            <p class="text-xs text-gray-600 mt-1 line-clamp-2">{{ rec.reason }}</p>
          </div>
        </div>
        
        <!-- Book Now button centered in card -->
        <div class="flex items-center justify-center mt-3 pt-3 border-t border-gray-100">
          <button (click)="bookService(rec.serviceId); $event.stopPropagation()" 
                  class="text-xs font-medium text-white bg-[#6F2C91] hover:bg-[#5a189a] transition-colors px-12 py-2 rounded-full w-full max-w-[200px]">
            Book Now →
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
