<div class="p-3 border-t flex gap-2">

  <input [(ngModel)]="text" (keydown.enter)="send()" placeholder="Type message..." class="
    flex-1
    border
    rounded-xl
    px-3 py-2
    text-sm
    focus:outline-none
    focus:ring-2
    focus:ring-indigo-500
    " />

  <button (click)="send()" class="
    bg-[#6B3293]
    text-white
    flex justify-center items-center
    px-4
    rounded-xl
      ">
    <app-icon-send></app-icon-send>
  </button>

</div>
