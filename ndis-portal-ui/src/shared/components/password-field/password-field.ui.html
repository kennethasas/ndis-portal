<div class="relative w-full">
    <input [type]="showPassword ? 'text' : 'password'" [placeholder]="placeholder" [name]="name" [(ngModel)]="model"
        (ngModelChange)="modelChange.emit($event)" [required]="required" class="
      w-full
      px-3 py-3 pr-10
      text-sm
      border border-slate-300
      rounded-lg
      outline-none
      transition-all
      bg-white

      focus:border-[#6F2C91]
      focus:ring-2 focus:ring-[#6F2C91]/10

      placeholder:text-slate-400
      disabled:bg-slate-100 disabled:cursor-not-allowed

      md:px-4 md:py-3.5 md:text-base
      2xl:px-5 2xl:py-4 2xl:text-lg
    " />

    <!-- Toggle -->
    <button type="button" (click)="togglePassword()" class="
      absolute right-2 top-1/2 -translate-y-1/2
      text-slate-500 hover:text-slate-700
      flex items-center justify-center

      md:right-3
      2xl:right-4
    ">
        <app-icon-unview *ngIf="!showPassword"></app-icon-unview>
        <app-icon-view *ngIf="showPassword"></app-icon-view>
    </button>
</div>
