<div class="w-full">

  <!-- LABEL -->
  <label *ngIf="label" [for]="name" class="
      block
      mb-1.5
      text-xs
      font-medium
      text-slate-600

      md:text-sm
      2xl:text-base
    ">
    {{ label }}
  </label>

  <!-- INPUT -->
  <input [type]="type" [id]="name" [name]="name" [placeholder]="placeholder" [required]="required" [disabled]="disabled"
    [value]="value" (input)="onInput($event)" (blur)="onTouched()" class="
      w-full
      p-2 md:p-3
      text-xs md:text-sm
      border border-slate-300
      rounded-lg
      outline-none
      transition-all
      bg-white

      focus:border-[#6F2C91]
      focus:ring-2 focus:ring-[#6F2C91]/10

      placeholder:text-slate-400
      disabled:bg-slate-100 disabled:cursor-not-allowed

      md:px-4 md:py-3.5 md:text-base
      2xl:px-5 2xl:py-4 2xl:text-lg
    " />
</div>
