<div [@panelAnimation]="state" class="
  fixed bottom-0 left-0
  w-full h-full
  sm:bottom-6 sm:left-6
  sm:w-[420px]
  sm:h-[600px]
  md:h-[75vh]
  bg-white
  rounded-lg
  border
  flex flex-col
  overflow-hidden
  z-50
  shadow-xl
  ">

  <!-- Header -->
  <div class="
    flex items-center justify-between
    px-4 py-3
    border-b
    bg-white
    ">
    <div class="flex items-center gap-2">
      <div class="
        w-8 h-8
        rounded-full
        bg-blue-600
        text-white
        flex items-center
        justify-center
        shadow
        ">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
        </svg>
      </div>

      <span class="font-semibold text-slate-700">
        Find the Right Service
      </span>
    </div>

    <button
      type="button"
      (click)="onClose()"
      class="text-slate-500 hover:text-slate-800 text-lg leading-none"
      aria-label="Close recommendation panel"
    >
      ×
    </button>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto p-4">
    <div class="space-y-4">
      <!-- Welcome Message -->
      <div class="text-center py-4">
        <h3 class="text-lg font-semibold text-slate-800 mb-2">
          Let's find the perfect services for you
        </h3>
        <p class="text-sm text-slate-600">
          Tell us what areas of daily life you need support with, and we'll recommend the most relevant services.
        </p>
      </div>

      <!-- Loading State -->
      <div *ngIf="isLoadingCategories" class="flex flex-col items-center justify-center py-8">
        <svg class="animate-spin h-8 w-8 text-blue-600 mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
        </svg>
        <p class="text-sm text-slate-600">Loading available services...</p>
      </div>

      <!-- Error State -->
      <div *ngIf="categoriesError" class="text-center py-8">
        <div class="text-red-500 mb-4">
          <svg class="h-12 w-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
          </svg>
        </div>
        <p class="text-sm text-slate-600 mb-4">Failed to load service categories.</p>
        <button
          (click)="retryLoadCategories()"
          class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors"
        >
          Retry
        </button>
      </div>

      <!-- Questions Form -->
      <form *ngIf="!isLoadingCategories && !categoriesError" (ngSubmit)="onSubmitRecommendation()" class="space-y-4">
        <div class="space-y-3">
          <label class="block text-sm font-medium text-slate-700 mb-2">
            What areas of daily life do you need support with?
          </label>

          <!-- Dynamic Checkbox Options from Database -->
          <div class="space-y-2">
            <label *ngFor="let need of userNeeds" class="flex items-center p-3 border rounded-lg hover:bg-slate-50 cursor-pointer">
              <input
                type="checkbox"
                [(ngModel)]="need.selected"
                [name]="'category-' + need.categoryId"
                class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
              <span class="ml-3 text-sm text-slate-700">{{ need.categoryName }}</span>
            </label>
          </div>

          <!-- Other Needs Text Area -->
          <div class="mt-4">
            <label class="block text-sm font-medium text-slate-700 mb-2">
              Any other specific needs or goals? (optional)
            </label>
            <textarea
              [(ngModel)]="otherNeeds"
              name="otherNeeds"
              rows="3"
              class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
              placeholder="Tell us about any other areas where you need support..."
            ></textarea>
          </div>
        </div>

        <!-- Submit Button -->
        <div class="pt-4">
          <button
            type="submit"
            [disabled]="isSubmitting || userNeeds.every(n => !n.selected)"
            class="w-full bg-blue-600 text-white py-3 px-4 rounded-lg font-medium hover:bg-blue-700 disabled:bg-slate-400 disabled:cursor-not-allowed transition-colors"
          >
            <span *ngIf="!isSubmitting">Get Recommendations</span>
            <span *ngIf="isSubmitting" class="flex items-center justify-center">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Finding recommendations...
            </span>
          </button>
        </div>
      </form>

      <!-- Recommendations Section (shown after submission) -->
      <div *ngIf="recommendations.length > 0" class="mt-6 space-y-3">
        <h4 class="font-semibold text-slate-800">Recommended Services</h4>
        <div class="space-y-3">
          <!-- Recommendation cards will be displayed here -->
          <div class="p-4 border rounded-lg bg-blue-50">
            <p class="text-sm text-slate-600">Recommendations will appear here...</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
