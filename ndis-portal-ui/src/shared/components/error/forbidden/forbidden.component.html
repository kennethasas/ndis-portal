<div class="min-h-screen flex items-center justify-center p-6">
  <div class="max-w-md w-full text-center">
    <!-- Error Text -->
    <h1
      class="text-8xl font-black text-[#6B3293] mb-2">
      403
    </h1>
    <h2 class="text-2xl font-bold text-[#6B3293] mb-4">Insufficient Permissions</h2>
    <p class="text-slate-800 text-lg mb-10 leading-relaxed px-4">
      You've reached a digital dead-end. Your account doesn't have the clearance levels required to view this page.
    </p>

    <!-- Navigation Actions -->
    <div class="flex flex-col gap-4 justify-center items-center">
      <a routerLink="/"
        class="bg-[#6B3293] hover:bg-[#5a2a7b] text-white rounded-lg px-6 md:px-20 py-3 md:py-4 text-sm md:text-base whitespace-nowrap">
        Return Home
      </a>
      <button (click)="goBack()"
        class="bg-transparent border-none px-0 py-0 text-[#6B3293] hover:text-[#6B3293] transition-colors">
        Go Back
      </button>
    </div>

  </div>
</div>
