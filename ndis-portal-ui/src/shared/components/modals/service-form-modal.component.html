<!-- BACKDROP -->
<div class="fixed inset-0 z-50 flex items-center justify-center bg-black/40">

  <!-- MODAL -->
  <div class="w-full max-w-2xl bg-white rounded-md shadow-xl p-8">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-6">

      <h2 class="text-xl font-semibold">
        Add New Service
      </h2>

      <!-- CLOSE BUTTON -->
      <button (click)="onClose.emit()" class="text-slate-500 hover:text-red-500 text-xl">
        ✕
      </button>

    </div>

    <!-- FORM -->
    <form [formGroup]="serviceForm" (ngSubmit)="submit()" class="space-y-6">

      <!-- ROW: NAME + CATEGORY -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <!-- SERVICE NAME -->
        <div>

          <label class="block text-sm font-medium mb-2">
            Service Name
          </label>

          <input type="text" formControlName="name" placeholder="Enter service name"
            class="w-full h-11 border border-slate-300 rounded-lg px-3 focus:outline-none focus:ring-2 focus:ring-violet-500" />

          <!-- VALIDATION -->
          <p *ngIf="serviceForm.controls.name.touched && serviceForm.controls.name.invalid"
            class="text-red-500 text-xs mt-1">
            Service name is required
          </p>

        </div>

        <!-- CATEGORY DROPDOWN -->
        <div>

          <label class="block text-sm font-medium mb-2">
            Category
          </label>

          <select formControlName="category"
            class="w-full h-11 border border-slate-300 rounded-lg px-3 focus:outline-none focus:ring-2 focus:ring-violet-500">

            <option value="">
              Select Category
            </option>

            <option value="IT Services">
              IT Services
            </option>

            <option value="Graphics">
              Graphics
            </option>

            <option value="Marketing">
              Marketing
            </option>

            <option value="Consulting">
              Consulting
            </option>

          </select>

          <!-- VALIDATION -->
          <p *ngIf="serviceForm.controls.category.touched && serviceForm.controls.category.invalid"
            class="text-red-500 text-xs mt-1">
            Category is required
          </p>

        </div>

      </div>

      <!-- DESCRIPTION (FULL WIDTH) -->
      <div>

        <label class="block text-sm font-medium mb-2">
          Description
        </label>

        <textarea formControlName="description" rows="5" placeholder="Enter service description"
          class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-violet-500"></textarea>

      </div>

      <!-- ACTION BUTTONS -->
      <div class="flex justify-end gap-3 pt-4">

        <!-- CANCEL -->
        <button type="button" (click)="onClose.emit()"
          class="px-5 py-2 border border-slate-300 rounded-lg hover:bg-slate-100">
          Cancel
        </button>

        <!-- SAVE -->
        <button type="submit" [disabled]="serviceForm.invalid"
          class="px-5 py-2 bg-violet-600 text-white rounded-lg hover:bg-violet-700 disabled:bg-slate-300">
          Save Service
        </button>

      </div>

    </form>

  </div>

</div>
