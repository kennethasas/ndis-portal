<div class="relative w-full font-sans">
  <!-- TRIGGER -->
  <button type="button" (click)="toggle()"
    class="flex items-center justify-between 
    w-full 
    px-3 py-2.5 
    md:px-4 md:py-3.5 md:text-base
    text-sm border border-slate-300 
    rounded-lg bg-white outline-none 
    focus:ring-2 focus:ring-[#6F2C91]/10 focus:border-[#6F2C91] transition-all">

    <span [class.text-slate-400]="!value" class="capitalize">
      {{ value || 'Role' }}
    </span>

    <span class="transition-transform duration-200" [class.rotate-180]="isOpen">
      <svg width="10" height="6" viewBox="0 0 10 6" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M1 1L5 5L9 1" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </span>
  </button>

  <!-- DROPDOWN MENU -->
  <div *ngIf="isOpen"
    class="absolute z-50 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg py-1 animate-in fade-in zoom-in duration-150">

    <button type="button" (click)="select('participant')"
      class="flex items-center w-full px-4 py-2 text-sm text-slate-700 hover:bg-violet-50 hover:text-violet-700 transition-colors">
      Participant
    </button>

    <button type="button" (click)="select('coordinator')"
      class="flex items-center w-full px-4 py-2 text-sm text-slate-700 hover:bg-violet-50 hover:text-violet-700 transition-colors">
      Coordinator
    </button>
  </div>
</div>
