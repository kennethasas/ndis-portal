<div class="p-6 space-y-6">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
        <h1 class="text-xl font-bold text-slate-900">My Bookings</h1>

        <app-status-dropdown [activeStatus]="activeFilter" (statusChange)="handleStatusFilter($event)">
        </app-status-dropdown>
    </div>

    <div class="relative">
        <div *ngIf="isLoading" class="absolute inset-0 bg-white/50 z-10 flex items-center justify-center">
            <span class="text-sm font-medium text-slate-500">Loading bookings...</span>
        </div>

        <app-booking-table [data]="bookings" (viewAction)="handleView($event)" (cancelAction)="handleCancel($event)">
        </app-booking-table>
    </div>

    <div class="flex justify-center mt-6" *ngIf="totalPages > 1">
        <app-pagination [currentPage]="currentPage" [totalPages]="totalPages" (pageChange)="handlePageChange($event)">
        </app-pagination>
    </div>
</div>
