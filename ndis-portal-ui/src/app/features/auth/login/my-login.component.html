<!-- Main Layout -->
<div 
  data-testid="login"
  class="flex min-h-screen w-screen font-sans overflow-auto max-md:flex-col">

  <!-- Image Side -->
  <div class="flex-none w-[42%] overflow-hidden h-screen max-md:w-full max-md:h-[22vh] max-md:min-h-[140px]">
    <app-slideshow class="block w-full h-full" [images]="slideImages" [interval]="5000" alt="NDIS Support Services">
    </app-slideshow>
  </div>

  <!-- Form Side -->
  <div class="flex-1 flex justify-center items-start md:items-center bg-white px-4 py-6">

    <!-- Form Container -->
    <div class="w-full md:w-[25rem]">

      <!-- Header -->
      <div class="flex items-center gap-3 mb-6">
        <!-- Change this to into official logo -->
        <div class="flex h-12 w-12 shrink-0 items-center justify-center overflow-hidden rounded-full bg-white ring-1 ring-slate-200 md:h-16 md:w-16">
          <img
            src="/assets/logondis.png"
            alt="NDIS Portal logo"
            class="h-full w-full object-contain p-2"
          />
        </div>
        <div class="space-y-1 md:space-y-3">
          <h1 class="text-xl md:text-5xl font-semibold text-gray-800">Welcome back</h1>
          <p class="text-xs md:text-sm text-gray-500">
            We're here to help you manage your day.
          </p>
        </div>
      </div>

      <!-- Form -->
      <form (ngSubmit)="onLogin()" class="space-y-3">
        <div>
          <app-input type="email" placeholder="Email" name="email" [(ngModel)]="email" [required]="true">
          </app-input>
        </div>


        <div>
          <app-password-field placeholder="Password" name="password" [(value)]="password" [required]="true">
          </app-password-field>
        </div>


        <!-- <div>
          <a href="#" class="text-xs md:text-sm text-[#6F2C91] hover:underline">
            Forgot Password?
          </a>
        </div> -->

        <!-- Button -->
        <button type="submit" [disabled]="isLoading"
          class="w-full py-2.5 text-sm md:py-3 md:text-base bg-[#6F2C91] text-white rounded-lg transition hover:bg-[#5a189a] disabled:opacity-50">
          {{ isLoading ? 'Logging in...' : 'Log in' }}
        </button>

        <!-- Error (VISIBLE on mobile) -->
        <div *ngIf="errorMessage" class="text-sm text-red-600 bg-red-50 border border-red-200 px-3 py-2 rounded-md">
          {{ errorMessage }}
        </div>

      </form>

      <!-- Footer -->
      <p class="text-center mt-5 text-gray-500 text-sm">
        Don't have an account yet?
        <a routerLink="/signup" class="text-[#6F2C91] font-semibold hover:underline">
          Sign up
        </a>
      </p>

    </div>
  </div>
</div>
