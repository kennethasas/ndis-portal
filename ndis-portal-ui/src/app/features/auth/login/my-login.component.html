<div class="login-page">
  <div class="image-section">
    <app-slideshow 
      [images]="slideImages"
      [interval]="5000"
      alt="NDIS Support Services">
    </app-slideshow>
  </div>

  <div class="form-section">
    <div class="form-container">
      <div class="header">
  <div class="logo-placeholder"></div>
  <div class="title-group">
    <h1>Welcome back</h1>
    <p class="subtitle">We're here to help you manage your day.</p>
  </div>
</div>
      
      <app-error-handling 
        [message]="errorMessage"
        [type]="errorType"
        [isVisible]="showError"
        (closeError)="closeError()">
      </app-error-handling>

      <form (ngSubmit)="onLogin()">
        <div class="input-group">
          <app-input
            type="email"
            placeholder="Email"
            name="email"
            [(ngModel)]="email"
            [required]="true">
          </app-input>
        </div>

        <div class="input-group">
          <app-input
            type="password"
            placeholder="Password"
            name="password"
            [(ngModel)]="password"
            [required]="true">
          </app-input>
        </div>

        <button type="submit" class="btn-login" [disabled]="isLoading">
          {{ isLoading ? 'Logging in...' : 'Log in' }}
        </button>
      </form>

      <p class="footer-text">
        Don't have an account yet? <a routerLink="/signup" class="signup-link">Sign up</a>
      </p>
    </div>
  </div>
</div>
