<div class="p-4 md:p-6 space-y-6 max-w-[2560px] mx-auto">

    <div class="w-full max-w-4xl mb-8">
        <h1 class="text-lg md:text-xl 2xl:text-3xl 4xl:text-5xl font-bold text-slate-900 truncate">
            Book a Service
        </h1>
    </div>

    <!-- Error Message -->
    <div *ngIf="errorMessage" 
         data-testid="error-message"
         class="w-full max-w-4xl bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded">
        {{ errorMessage }}
    </div>

    <!-- Success Message -->
    <div *ngIf="successMessage" class="w-full max-w-4xl bg-green-50 border border-green-200 text-green-700 px-4 py-3 rounded">
        {{ successMessage }}
    </div>

    <div class="p-4 md:p-6 flex flex-col items-center justify-center max-w-[2560px] mx-auto">
        <div class="w-full max-w-4xl space-y-10">    
            <!-- Loading Services -->
            <div *ngIf="isLoadingServices" class="flex items-center justify-center py-4">
                <div class="w-6 h-6 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin mr-2"></div>
                <span class="text-slate-500">Loading services...</span>
            </div>

            <!-- Loading Overlay -->
            <div *ngIf="isSubmitting" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
                <div class="bg-white rounded-lg p-6 flex flex-col items-center space-y-4">
                    <div class="w-8 h-8 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
                    <p class="text-slate-700 font-medium">Loading</p>
                    <p class="text-slate-500 text-sm">Please wait while we process your request</p>
                </div>
            </div>

            <div class="w-full space-y-6" *ngIf="!isLoadingServices">
                <!-- Service Selection -->
                <div class="space-y-2">
                    <app-select-service 
                        data-testid="service-select"
                        class="block w-full" 
                        [options]="services" 
                        [(value)]="bookingForm.serviceId" 
                        [disabled]="isSubmitting">
                    </app-select-service>
                    <div *ngIf="hasError('serviceId')" class="text-red-500 text-sm mt-1">
                        {{ getError('serviceId') }}
                    </div>
                </div>

                <!-- Preferred Date -->
                <div class="space-y-2">
                    <app-date-picker-component 
                        data-testid="date-input"
                        class="block w-full" 
                        [(value)]="bookingForm.preferredDate" 
                        [disabled]="isSubmitting">
                    </app-date-picker-component>
                    <div *ngIf="hasError('preferredDate')" class="text-red-500 text-sm mt-1">
                        {{ getError('preferredDate') }}
                    </div>
                </div>

                <!-- Notes -->
                <div class="space-y-2">
                    <app-text-area-component 
                        data-testid="notes-input"
                        class="block w-full" 
                        [(value)]="bookingForm.notes" 
                        [disabled]="isSubmitting">
                    </app-text-area-component>
                </div>
            </div>

            <div class="flex flex-col-reverse md:flex-row justify-end items-center gap-8 pt-6">
                <app-back-button (onClick)="navBack()"></app-back-button>
                <app-book-button 
                    data-testid="submit-btn"
                    (onClick)="submitBooking()" 
                    [disabled]="isSubmitting" 
                    [isLoading]="isSubmitting">
                </app-book-button>
            </div>
        </div>
    </div>
</div>
