<!-- services-list.page.html -->
<div class="p-4 md:p-6 space-y-6 max-w-[2560px] mx-auto">
    <header class="sticky flex w-full items-center justify-between">
        <h1 class="text-xl font-bold text-slate-900">Our Services</h1>
        <!-- Pass allServices to the dropdown for dynamic filtering -->
        <app-category-dropdown [services]="allServices" (categoryChange)="handleCategoryFilter($event)">
        </app-category-dropdown>
    </header>

    <main>
        <!-- AI Recommendation Card (always first) -->
        <section class="grid w-full grid-cols-[repeat(auto-fill,minmax(280px,1fr))] gap-5 p-4 items-stretch">
            <app-ai-recommendation-card (cardSelected)="openAiRecommendation()" 
                class="block w-full max-w-[320px] cursor-pointer transition-transform duration-200 hover:scale-[1.02] active:scale-95">
            </app-ai-recommendation-card>
        </section>

        <!-- Regular Services -->
        <app-service-card-component [services]="filteredServices" (cardSelected)="onCardClick($event)">
        </app-service-card-component>
    </main>

    <!-- Chat Container (for AI recommendation functionality) -->
    <app-chatbot-container #chatContainer></app-chatbot-container>
</div>
