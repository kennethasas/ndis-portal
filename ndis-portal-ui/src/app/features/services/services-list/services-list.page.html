<div class="p-4 md:p-6 space-y-6 max-w-[2560px] mx-auto">

    <header class="flex w-full items-center justify-between">
        <h1 class="text-lg md:text-xl 2xl:text-3xl 4xl:text-5xl font-bold text-slate-900 truncate">
            Our Services
        </h1>

        <div class="flex items-center justify-end">
            <app-category-dropdown [services]="allCategory" (categoryChange)="handleCategoryFilter($event)"></app-category-dropdown>
        </div>
    </header>

    <main>
        <app-service-card-component *ngFor="let item of services; trackBy: trackByServiceId" [title]="item.name"
            [description]="item.description" [tag]="item.category" [icon]="item.icon" (click)="onCardClick(item)">
        </app-service-card-component>
    </main>
</div>
