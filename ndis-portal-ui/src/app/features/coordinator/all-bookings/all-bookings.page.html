<div class="p-4 md:p-6 space-y-6 max-w-[2560px] mx-auto">
  <div class="flex flex-row items-center justify-between gap-4 w-full">
    <h1 class="text-lg md:text-xl font-bold text-slate-900">All Bookings</h1>
  </div>

  <div>
    <div *ngIf="isLoadingBookings" class="flex flex-col items-center justify-center h-32 gap-4">
      <div class="w-8 h-8 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
      <p class="text-slate-400 font-medium">Loading bookings...</p>
    </div>

    <div
      *ngIf="!isLoadingBookings"
      class="overflow-x-auto rounded-lg border border-slate-200"
      data-testid="bookings-table"
    >
      <table class="min-w-full divide-y divide-slate-200">
        <thead class="bg-slate-50">
          <tr>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
              Participant Name
            </th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
              Service
            </th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
              Preferred Date
            </th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
              Status
            </th>
            <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">
              Actions
            </th>
          </tr>
        </thead>

        <tbody class="bg-white divide-y divide-slate-200">
          <tr *ngFor="let booking of bookings" class="hover:bg-slate-50 transition-colors">
            <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">
              {{ booking.participantName || booking.userId }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
              {{ booking.serviceName }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">
              {{ booking.preferredDate | date:'mediumDate' }}
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <span
                [ngClass]="{
                  'bg-yellow-100 text-yellow-800': booking.status === 'Pending',
                  'bg-green-100 text-green-800': booking.status === 'Approved',
                  'bg-red-100 text-red-800': booking.status === 'Cancelled'
                }"
                class="px-2 py-1 text-xs font-medium rounded-full"
              >
                {{ booking.status }}
              </span>
            </td>
            <td class="px-6 py-4 whitespace-nowrap">
              <div class="relative" *ngIf="isPending(booking)">
                <button
                  (click)="toggleMenu(booking)"
                  class="p-1.5 bg-white border border-slate-300 hover:bg-slate-100 hover:border-slate-400 rounded-md transition-all shadow-sm"
                  data-testid="menu-btn"
                  title="Actions"
                >
                  <svg class="w-5 h-5 text-slate-600" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z" />
                  </svg>
                </button>

                <div
                  *ngIf="activeMenuId === booking.id"
                  class="absolute right-0 top-full mt-1 w-32 bg-white rounded-lg shadow-lg border border-slate-200 z-10"
                  [attr.data-testid]="'dropdown-menu-' + booking.id"
                >
                  <div class="flex flex-col">
                    <button
                      (click)="approveBooking(booking)"
                      data-testid="approve-btn"
                      class="w-full px-4 py-2 text-left text-sm hover:bg-emerald-50 text-emerald-700 transition-colors"
                    >
                      Approve
                    </button>
                  </div>
                </div>
              </div>
              <span *ngIf="!isPending(booking)" class="text-slate-400 text-sm">-</span>
            </td>
          </tr>

          <tr *ngIf="bookings.length === 0">
            <td colspan="5" class="px-6 py-12 text-center text-sm text-slate-400">
              No bookings found
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
