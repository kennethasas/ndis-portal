<div class="p-4 md:p-6 space-y-6 max-w-[2560px] mx-auto">

    <!-- Loading state for stats -->
    <div *ngIf="isLoading" class="flex flex-col items-center justify-center h-32 gap-4">
        <div class="w-8 h-8 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
        <p class="text-slate-400 font-medium">Loading stats...</p>
    </div>

    <!-- Stats cards -->
    <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" data-testid="stat-card">
        <app-status-card-component *ngFor="let stat of stats" [label]="stat.label" [value]="stat.value"
            [iconClass]="stat.icon" [iconColor]="stat.color" [bgColor]="stat.bg">
        </app-status-card-component>
    </div>

    <!-- Recent Bookings Table -->
    <div class="mt-8">
        <h2 class="text-xl font-bold text-slate-900 mb-4">Recent Bookings</h2>

        <!-- Loading state for bookings -->
        <div *ngIf="isLoadingBookings" class="flex flex-col items-center justify-center h-32 gap-4">
            <div class="w-8 h-8 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
            <p class="text-slate-400 font-medium">Loading bookings...</p>
        </div>

        <!-- Bookings Table -->
        <div *ngIf="!isLoadingBookings" class="overflow-x-auto rounded-lg border border-slate-200" data-testid="bookings-table">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-4 py-4 text-left border-b border-slate-100 text-slate-900 font-semibold text-sm">Participant Name</th>
                        <th class="px-4 py-4 text-left border-b border-slate-100 text-slate-900 font-semibold text-sm">Service</th>
                        <th class="px-4 py-4 text-left border-b border-slate-100 text-slate-900 font-semibold text-sm">Preferred Date</th>
                        <th class="px-4 py-4 text-left border-b border-slate-100 text-slate-900 font-semibold text-sm">Status</th>
                        <th class="px-4 py-4 text-left border-b border-slate-100 text-slate-900 font-semibold text-sm">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-slate-200">
                    <tr *ngFor="let booking of bookings" class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">{{ booking.participantName || booking.userId }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{{ booking.serviceName }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{{ booking.preferredDate | date:'mediumDate' }}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span 
                                class="px-3 py-1 border rounded-md  text-xs font-medium"
                                [ngClass]="{
                                    'text-[#CF971D]': booking.status === 'Pending',
                                    'text-[#289839]': booking.status === 'Approved',
                                    'text-[#DB4444]': booking.status === 'Cancelled'
                                }"
                            >
                                {{ booking.status }}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="relative" *ngIf="isPending(booking)">
                                <!-- Three dots menu button -->
                                <button (click)="toggleMenu(booking)"
                                    class="p-1.5 bg-white border border-slate-300 hover:bg-slate-100 hover:border-slate-400 rounded-md transition-all shadow-sm"
                                    data-testid="menu-btn" title="Actions">
                                    <svg class="w-5 h-5 text-slate-600" fill="currentColor" viewBox="0 0 20 20">
                                        <path d="M10 6a2 2 0 110-4 2 2 0 010 4zM10 12a2 2 0 110-4 2 2 0 010 4zM10 18a2 2 0 110-4 2 2 0 010 4z"/>
                                    </svg>
                                </button>
                                
                                <!-- Dropdown menu -->
                                <div *ngIf="activeMenuId === booking.id" 
                                     class="absolute right-full top-1/2 mr-2 -translate-y-1/2 w-max bg-white rounded-lg shadow-lg border border-slate-200 z-50"
                                     [attr.data-testid]="'dropdown-menu-' + booking.id">
                                    <div class="flex items-center">
                                        <button (click)="cancelBooking(booking)" data-testid="cancel-btn"
                                            class="px-4 py-2 text-sm hover:bg-rose-50 text-rose-700 transition-colors whitespace-nowrap">
                                            Cancel
                                        </button>
                                        <button (click)="approveBooking(booking)" data-testid="approve-btn"
                                            class="px-4 py-2 text-sm hover:bg-emerald-50 text-emerald-700 transition-colors whitespace-nowrap border-l border-slate-100">
                                            Approve
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <span *ngIf="!isPending(booking)" class="text-slate-400 text-sm">-</span>
                        </td>
                    </tr>
                    <tr *ngIf="bookings.length === 0">
                        <td colspan="5" class="px-6 py-12 text-center text-sm text-slate-400">No bookings found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
