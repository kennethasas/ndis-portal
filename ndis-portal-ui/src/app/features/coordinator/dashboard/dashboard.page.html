<div class="p-4 md:p-6 space-y-6 max-w-[2560px] mx-auto">

    <!-- Loading state for stats -->
    <div *ngIf="isLoading" class="flex flex-col items-center justify-center h-32 gap-4">
        <div class="w-8 h-8 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
        <p class="text-slate-400 font-medium">Loading stats...</p>
    </div>

    <!-- Stats cards -->
    <div *ngIf="!isLoading" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" data-testid="stat-card">
        <app-status-card-component *ngFor="let stat of stats" [label]="stat.label" [value]="stat.value"
            [iconClass]="stat.icon" [iconColor]="stat.color" [bgColor]="stat.bg">
        </app-status-card-component>
    </div>

    <!-- Recent Bookings Table -->
    <div class="mt-8">
        <h2 class="text-xl font-bold text-slate-900 mb-4">Recent Bookings</h2>

        <!-- Loading state for bookings -->
        <div *ngIf="isLoadingBookings" class="flex flex-col items-center justify-center h-32 gap-4">
            <div class="w-8 h-8 border-4 border-violet-100 border-t-violet-600 rounded-full animate-spin"></div>
            <p class="text-slate-400 font-medium">Loading bookings...</p>
        </div>

        <!-- Bookings Table -->
        <div *ngIf="!isLoadingBookings" class="overflow-x-auto rounded-lg border border-slate-200" data-testid="bookings-table">
            <table class="min-w-full divide-y divide-slate-200">
                <thead class="bg-slate-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Participant Name</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Service</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Preferred Date</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Status</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-slate-500 uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-slate-200">
                    <tr *ngFor="let booking of bookings" class="hover:bg-slate-50 transition-colors">
                        <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-slate-900">{{ booking.participantName || booking.userId }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{{ booking.serviceName }}</td>
                        <td class="px-6 py-4 whitespace-nowrap text-sm text-slate-500">{{ booking.preferredDate | date:'mediumDate' }}</td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <span [ngClass]="{
                                'bg-yellow-100 text-yellow-800': booking.status === 'Pending',
                                'bg-green-100 text-green-800': booking.status === 'Approved',
                                'bg-red-100 text-red-800': booking.status === 'Cancelled'
                            }" class="px-2 py-1 text-xs font-medium rounded-full">
                                {{ booking.status }}
                            </span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap">
                            <div class="flex items-center gap-2" *ngIf="isPending(booking)">
                                <button (click)="approveBooking(booking)" data-testid="approve-btn"
                                    class="px-3 py-1 bg-emerald-500 text-white text-sm rounded hover:bg-emerald-600 transition-colors">
                                    Approve
                                </button>
                                <button (click)="cancelBooking(booking)" data-testid="cancel-btn"
                                    class="px-3 py-1 bg-red-500 text-white text-sm rounded hover:bg-red-600 transition-colors">
                                    Cancel
                                </button>
                            </div>
                            <span *ngIf="!isPending(booking)" class="text-slate-400 text-sm">-</span>
                        </td>
                    </tr>
                    <tr *ngIf="bookings.length === 0">
                        <td colspan="5" class="px-6 py-12 text-center text-sm text-slate-400">No bookings found</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
